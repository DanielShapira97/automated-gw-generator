<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated GW Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <main class="container">
        <header>
            <h1>GW <span class="gradient-text">Generator</span></h1>
            <p>Automated Ground Truth Extraction</p>
        </header>

        <div class="card glass-panel">
            <div class="upload-area" id="drop-zone">
                <div class="upload-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </div>
                <h3>Drag & Drop your file here</h3>
                <p>or click to browse (.pdf, .docx)</p>
                <input type="file" id="file-input" accept=".pdf,.docx" hidden>
            </div>

            <div class="options-area">
                <div class="mode-selector">
                    <label class="mode-option">
                        <input type="radio" name="mode" value="classic" checked>
                        <span>Classic (Fast)</span>
                    </label>
                    <label class="mode-option">
                        <input type="radio" name="mode" value="llm">
                        <span>Google Gemini (Accurate)</span>
                    </label>
                    <label class="mode-option">
                        <input type="radio" name="mode" value="compare">
                        <span>Compare Both</span>
                    </label>
                </div>
            </div>

            <div class="actions-area">
                <button id="process-btn" class="primary-btn" disabled>
                    <span class="btn-text">Process Document</span>
                    <span class="loader" style="display: none;"></span>
                </button>
            </div>
            
            <div id="error-message" class="error-msg" style="display: none;"></div>
        </div>

        <!-- Metrics Dashboard (Only shown in Compare Mode) -->
        <div id="metrics-dashboard" class="card glass-panel" style="display: none;">
            <div class="metrics-header">
                <h2>Comparison Metrics</h2>
                <label class="toggle-container" id="diff-toggle-container">
                    <span class="toggle-label">Highlight Differences</span>
                    <div class="toggle-switch">
                        <input type="checkbox" id="diff-toggle">
                        <span class="slider round"></span>
                    </div>
                </label>
            </div>
            <div class="metrics-grid">
                <div class="metric-card">
                    <span class="metric-title">Classic Words</span>
                    <span class="metric-value" id="m-classic-words">0</span>
                </div>
                <div class="metric-card">
                    <span class="metric-title">Gemini Words</span>
                    <span class="metric-value" id="m-llm-words">0</span>
                </div>
                <div class="metric-card">
                    <span class="metric-title">Classic Blocks</span>
                    <span class="metric-value" id="m-classic-blocks">0</span>
                </div>
                <div class="metric-card">
                    <span class="metric-title">Gemini Blocks</span>
                    <span class="metric-value" id="m-llm-blocks">0</span>
                </div>
            </div>
        </div>

        <div id="result-container" class="card glass-panel" style="display: none;">
            <div class="result-header">
                <h2 id="result-title">Extracted Text</h2>
                <button id="download-btn" class="secondary-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Download .txt
                </button>
            </div>
            <!-- Single View -->
            <div class="result-content" id="single-view">
                <textarea id="result-text" readonly></textarea>
            </div>
            <!-- Compare View -->
            <div class="result-content compare-view" id="compare-view" style="display: none;">
                <div class="compare-pane">
                    <h3>Classic Engine</h3>
                    <div id="classic-result-box" class="compare-box"></div>
                </div>
                <div class="compare-pane">
                    <h3>Google Gemini Engine</h3>
                    <div id="llm-result-box" class="compare-box"></div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/diff_match_patch/20121119/diff_match_patch.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
